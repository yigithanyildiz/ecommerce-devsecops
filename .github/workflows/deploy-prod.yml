name: Deploy PROD

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ecommerce:ecommerce_password@localhost:5432/ecommerce_dev?schema=public
        
      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run dependency audit
        run: npm audit --audit-level=high
        

      - name: Build backend
        run: npm run build

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: backend-validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  devlead-approval:
    name: Dev Lead Approval
    runs-on: ubuntu-latest
    needs: secret-scan
    environment: devlead-approval

    steps:
      - name: Dev Lead approved
        run: echo "Dev Lead approval completed."

  securitylead-approval:
    name: Security Lead Approval
    runs-on: ubuntu-latest
    needs: devlead-approval
    environment: securitylead-approval

    steps:
      - name: Security Lead approved
        run: echo "Security Lead approval completed."

  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest
    needs: securitylead-approval
    environment: production

    steps:
      - name: Deploy to Azure VM PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/ecommerce/app
            git fetch origin
            git checkout main
            git pull origin main
            cd infrastructure/prod
            docker compose -f docker-compose.prod.yml up -d --build

  health-check-prod:
    name: Health Check PROD
    runs-on: ubuntu-latest
    needs: deploy-prod

    steps:
      - name: Check PROD health endpoint
        run: |
          curl --fail --retry 10 --retry-delay 5 https://api.yigithanyildiz.com/health
