name: PR Validation

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ecommerce:ecommerce_password@localhost:5432/ecommerce_dev?schema=public
        
      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run dependency audit
        run: npm audit --audit-level=high
        
      - name: Build backend
        run: npm run build

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: backend-validation

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  sast-semgrep:
    name: SAST Semgrep
    runs-on: ubuntu-latest
    needs: backend-validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-ten
          generateSarif: "1"

      - name: Upload Semgrep SARIF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sast-report
          path: semgrep.sarif
          if-no-files-found: ignore